name: Test

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - '**/*.ts'
      - '**/*.tsx'
      - '*.js'
      - '*.json'
      - '*.lock'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/test.yml'
      - '**/*.ts'
      - '**/*.tsx'
      - '*.js'
      - '*.json'
      - '*.lock'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node (Yarn cache)
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.4
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test --ci  --forceExit --runInBand