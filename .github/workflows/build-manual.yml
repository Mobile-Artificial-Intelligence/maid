name: Build Manual

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-manual.yml'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/build-manual.yml'
      - 'docs/**'

jobs:
  build-manual:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX manual
        uses: xu-cheng/latex-action@v3
        with:
          root_file: manual.tex
          working_directory: docs

      - name: Upload manual PDF
        uses: actions/upload-artifact@v4
        with:
          name: maid-manual
          path: docs/manual.pdf
          if-no-files-found: error

      - name: Dispatch to website
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/Mobile-Artificial-Intelligence/website/dispatches" \
            -d "{\"event_type\":\"maid-manual-built\",\"client_payload\":{\"run_id\":\"${{ github.run_id }}\"}}"
